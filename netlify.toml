[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

# SPA fallback — must come AFTER functions are registered at /.netlify/functions/*
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
